<style>
        .reveal-3d {
            opacity: 0;
            transform: translateY(30px) translateZ(-50px) rotateX(-5deg);
            animation: reveal3D 1.2s cubic-bezier(.19, 1, .22, 1) forwards;
        }
        @keyframes reveal3D {
            100% {
                opacity: 1;
                transform: translateY(0) translateZ(0) rotateX(0);
            }
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }

        .particle-system {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 10;
        }
        .particle {
            position: absolute;
            background-color: #f0d68c; /* pale-gold */
            border-radius: 50%;
            opacity: 0.1;
            animation: drift 20s linear infinite;
        }
        @keyframes drift {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
        }
        
        .pucuk-rebung {
            position: absolute;
            width: 60px;
            height: 60px;
            fill: #c9a24e; /* songket-gold */
            opacity: 0.6;
            transition: opacity 0.5s ease;
            z-index: 20;
        }
        .section-container:hover .pucuk-rebung {
            opacity: 1;
        }
        .top-left { top: 32px; left: 32px; transform: rotate(0deg); }
        .top-right { top: 32px; right: 32px; transform: rotate(90deg); }
        .bottom-right { bottom: 32px; right: 32px; transform: rotate(180deg); }
        .bottom-left { bottom: 32px; left: 32px; transform: rotate(270deg); }
      </style>
