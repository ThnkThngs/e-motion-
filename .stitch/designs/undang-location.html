            height: 40px;

<main>

<div class="absolute inset-0 gold-dust opacity-20 pointer-events-none"></div>
<div class="max-w-container-max mx-auto flex flex-col items-start">

<div class="h-[1px] flex-grow bg-songket-gold/30"></div>
<div class="w-2 h-2 rounded-full border border-songket-gold flex items-center justify-center">
<div class="w-0.5 h-0.5 bg-songket-gold rounded-full"></div>
</div>
<div class="h-[1px] flex-grow bg-songket-gold/30"></div>
</div>
</div>

<svg class="pucuk-rebung absolute bottom-2 left-2 -rotate-90" viewbox="0 0 40 40"><path d="M20 0l3 10h7l-6 6 3 10-7-6-7 6 3-10-6-6h7z"></path></svg>

<div class="absolute inset-0 overflow-hidden" data-location="Petaling Jaya" style="">

</div>
<!-- Center Pin & Rings -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="relative">
<!-- Pulsing Rings -->
<div class="absolute inset-0 -m-10 border border-pale-gold/30 rounded-full animate-ping"></div>
<div class="absolute inset-0 -m-6 border border-pale-gold/20 rounded-full animate-pulse"></div>

<div class="-rotate-45">

</div>
</div>
</div>
</div>
<!-- Compass Rose -->

<span class="material-symbols-outlined text-4xl">explore</span>
</div>
</div>
</div>

<span class="material-symbols-outlined text-sm">location_on</span>
