<!DOCTYPE html>

<html class="dark" lang="ms"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&amp;family=Inter:wght@300;400;500;600;700&amp;family=EB+Garamond:ital,wght@0,400;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "songket-gold": "#c9a24e",
                        "ivory-warm": "#f2e6c8",
                        "royal-maroon": "#6b1d2e",
                        "surface-container-low": "#1e1b11",
                        "surface-variant": "#383528",
                        "background": "#161309",
                        "secondary": "#ebc169",
                        "champagne-gold": "#e8c775",
                        "surface-container-high": "#2d2a1e",
                        "on-surface": "#eae2d0",
                        "maroon-velvet": "#4a1020",
                        "gold-shadow": "#8a6d2a",
                        "indigo-twilight": "#1a2040",
                        "surface-container": "#231f14",
                        "pale-gold": "#f0d68c",
                        "surface-dim": "#161309",
                        "surface": "#161309",
                        "surface-container-lowest": "#110e05",
                        "warm-ivory": "#f8f0de",
                        "indigo-night": "#0d1228",
                        "indigo-mist": "#2a3460",
                        "emerald-deep": "#1a3525",
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "eyebrow-label": ["inter", "sans-serif"],
                        "section-title": ["Playfair Display", "serif"],
                        "section-sub": ["EB Garamond", "serif"],
                        "body-main": ["inter", "sans-serif"],
                        "hero-title": ["Playfair Display", "serif"]
                    },
                    "fontSize": {
                        "eyebrow-label": ["11px", { "letterSpacing": "0.35em", "fontWeight": "500" }],
                        "section-title-mobile": ["40px", { "lineHeight": "1.1", "letterSpacing": "-0.02em" }],
                        "section-sub": ["19px", { "lineHeight": "1.6", "fontWeight": "300" }],
                        "body-main": ["17px", { "lineHeight": "1.6" }]
                    }
                },
            },
        }
    </script>
<style>
        body { background-color: #161309; }
        .glass-card {
            background: linear-gradient(135deg, rgba(26, 32, 64, 0.55) 0%, rgba(13, 18, 40, 0.65) 100%);
            backdrop-filter: blur(18px) saturate(140%);
            border: 1px solid rgba(201, 162, 78, 0.28);
        }
        .reveal-3d {
            animation: reveal 1.2s cubic-bezier(.19, 1, .22, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }
        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }
        .gold-dust {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #c9a24e;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(1px);
        }
        .pucuk-rebung-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 60H0L30 0Z' fill='%23c9a24e' fill-opacity='0.06'/%3E%3C/svg%3E");
        }
        .text-gradient-gold {
            background: linear-gradient(to bottom, #e8c775, #c9a24e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        input:focus, textarea:focus {
            outline: 2px solid #c9a24e;
            outline-offset: 2px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="overflow-x-hidden selection:bg-songket-gold/30 selection:text-pale-gold">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-gutter-mobile py-4 backdrop-blur-md bg-background/30 shadow-[0_4px_30px_rgba(201,162,78,0.1)]">
<button class="text-songket-gold material-symbols-outlined">menu</button>
<span class="font-eyebrow-label text-eyebrow-label tracking-[0.35em] text-songket-gold">PERSANTAPAN DIRAJA</span>
<button class="text-songket-gold material-symbols-outlined">notifications</button>
</header>
<main class="relative min-h-screen pt-24 pb-32 px-gutter-mobile bg-indigo-twilight pucuk-rebung-pattern overflow-hidden">
<!-- Drifting Gold Dust Effect -->
<div class="absolute inset-0 pointer-events-none opacity-40">
<div class="gold-dust" style="top:10%; left:20%; animation: float 15s infinite linear;"></div>
<div class="gold-dust" style="top:40%; left:80%; animation: float 12s infinite linear;"></div>
<div class="gold-dust" style="top:70%; left:30%; animation: float 18s infinite linear;"></div>
<div class="gold-dust" style="top:90%; left:60%; animation: float 20s infinite linear;"></div>
</div>
<section class="max-w-md mx-auto flex flex-col">
<!-- Header Section -->
<div class="flex flex-col items-end mb-sub-mb reveal-3d" style="animation-delay: 0.1s;">
<span class="font-eyebrow-label text-eyebrow-label text-champagne-gold uppercase tracking-[0.32em] text-right">SAH KEHADIRAN</span>
<h2 class="font-section-title text-section-title-mobile italic text-gradient-gold mt-2 text-right">RSVP Mesra</h2>
<div class="flex items-center w-32 mt-4 space-x-2">
<div class="h-[1px] flex-grow bg-songket-gold/40"></div>
<span class="text-songket-gold material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">spa</span>
<div class="h-[1px] w-4 bg-songket-gold/40"></div>
</div>
<p class="font-section-sub text-section-sub text-warm-ivory italic text-right mt-6 max-w-[280px]">
                    Bantu kami merancang dengan baik. Sila sahkan kehadiran anda sebelum 1 Disember 2026.
                </p>
</div>
<!-- Main RSVP Form Card -->
<div class="glass-card relative p-8 mb-12 reveal-3d rounded-xl" style="animation-delay: 0.3s;">
<!-- Pucuk Rebung Corner Ornaments -->
<div class="absolute top-2 left-2 w-10 h-10 text-songket-gold/40 opacity-60">
<svg class="w-full h-full" viewbox="0 0 100 100"><path d="M50 0 L100 100 L50 70 L0 100 Z" fill="currentColor"></path></svg>
</div>
<div class="absolute top-2 right-2 w-10 h-10 text-songket-gold/40 opacity-60 rotate-90">
<svg class="w-full h-full" viewbox="0 0 100 100"><path d="M50 0 L100 100 L50 70 L0 100 Z" fill="currentColor"></path></svg>
</div>
<div class="absolute bottom-2 left-2 w-10 h-10 text-songket-gold/40 opacity-60 -rotate-90">
<svg class="w-full h-full" viewbox="0 0 100 100"><path d="M50 0 L100 100 L50 70 L0 100 Z" fill="currentColor"></path></svg>
</div>
<div class="absolute bottom-2 right-2 w-10 h-10 text-songket-gold/40 opacity-60 rotate-180">
<svg class="w-full h-full" viewbox="0 0 100 100"><path d="M50 0 L100 100 L50 70 L0 100 Z" fill="currentColor"></path></svg>
</div>
<form class="space-y-6 relative z-10">
<!-- Name Input -->
<div class="flex flex-col">
<label class="font-eyebrow-label text-eyebrow-label text-champagne-gold mb-2 ml-1">NAMA PENUH</label>
<input class="bg-indigo-mist/40 border border-songket-gold/20 rounded-[4px] px-4 py-3 text-warm-ivory placeholder:text-warm-ivory/30 font-body-main focus:ring-0" placeholder="Masukkan nama anda" type="text"/>
</div>
<!-- Phone Input -->
<div class="flex flex-col">
<label class="font-eyebrow-label text-eyebrow-label text-champagne-gold mb-2 ml-1">NOMBOR TELEFON</label>
<div class="flex">
<span class="flex items-center justify-center px-4 bg-indigo-mist/60 border border-r-0 border-songket-gold/20 rounded-l-[4px] text-champagne-gold font-body-main">+60</span>
<input class="flex-grow bg-indigo-mist/40 border border-songket-gold/20 rounded-r-[4px] px-4 py-3 text-warm-ivory placeholder:text-warm-ivory/30 font-body-main focus:ring-0" placeholder="123456789" type="tel"/>
</div>
</div>
<!-- Attendance Control -->
<div class="flex flex-col">
<label class="font-eyebrow-label text-eyebrow-label text-champagne-gold mb-3 ml-1 text-center">KEHADIRAN</label>
<div class="flex items-stretch h-12 bg-indigo-mist/40 rounded-full border border-songket-gold/10 p-1">
<button class="flex-1 flex items-center justify-center font-eyebrow-label text-[10px] text-songket-gold/50 rounded-l-full" type="button">TIDAK HADIR</button>
<button class="flex-[1.5] flex items-center justify-center font-eyebrow-label text-[10px] text-indigo-night bg-gradient-to-b from-champagne-gold to-songket-gold rounded-[4px] shadow-lg shadow-gold-shadow/30 font-bold scale-105 z-10" type="button">HADIR</button>
<button class="flex-1 flex items-center justify-center font-eyebrow-label text-[10px] text-songket-gold/50 rounded-r-full" type="button">TIDAK PASTI</button>
</div>
</div>
<!-- Stepper -->
<div class="flex flex-col">
<label class="font-eyebrow-label text-eyebrow-label text-champagne-gold mb-3 ml-1">JUMLAH HADIR</label>
<div class="flex items-center justify-between">
<button class="w-11 h-11 border border-songket-gold/40 rounded-[4px] flex items-center justify-center text-songket-gold active:bg-songket-gold/10 transition-colors" type="button">
<span class="material-symbols-outlined">remove</span>
</button>
<div class="flex-grow mx-4 h-11 glass-card border-none flex items-center justify-center rounded-[4px]">
<span class="font-section-title text-2xl italic text-champagne-gold">2</span>
</div>
<button class="w-11 h-11 border border-songket-gold/40 rounded-[4px] flex items-center justify-center text-songket-gold active:bg-songket-gold/10 transition-colors" type="button">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Message Area -->
<div class="flex flex-col">
<label class="font-eyebrow-label text-eyebrow-label text-champagne-gold mb-2 ml-1">PESANAN (PILIHAN)</label>
<textarea class="bg-indigo-mist/40 border border-songket-gold/20 rounded-[4px] px-4 py-3 text-warm-ivory placeholder:text-warm-ivory/30 font-section-sub italic focus:ring-0" placeholder="Tuliskan ucapan atau pesanan anda di sini..." rows="4"></textarea>
</div>
</form>
</div>
<!-- Submit Button -->
<div class="reveal-3d" style="animation-delay: 0.5s;">
<button class="w-full py-4 bg-gradient-to-b from-champagne-gold to-songket-gold rounded-full font-eyebrow-label text-[13px] tracking-[0.32em] text-indigo-night shadow-[0_12px_40px_rgba(201,162,78,0.25)] active:scale-95 transition-all duration-300">
                    HANTAR RSVP
                </button>
</div>
<!-- Footer Closing -->
<footer class="mt-8 mb-20 text-right reveal-3d" style="animation-delay: 0.7s;">
<p class="font-section-sub text-sm text-warm-ivory/40 italic">
                    Tarikh tutup RSVP: 1 Disember 2026.
                </p>
</footer>
</section>
<!-- Decorative Floating Image for Ambience -->
<div class="absolute -left-20 bottom-10 w-64 h-64 opacity-20 rotate-12 blur-sm pointer-events-none">
<img alt="Royal Decor" class="w-full h-full object-cover rounded-full" data-alt="A macro shot of intricate gold-threaded Malay Songket fabric, shimmering under warm candlelit twilight. The pattern is traditional pucuk rebung in deep indigo and shimmering champagne-gold. The lighting is low and atmospheric, emphasizing the rich texture and hand-woven craftsmanship of the heritage textile. Soft bokeh circles of light drift across the composition." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwx4WnHYRCBSSIubftqSMTICopnYALeeOVYPA1J9vYzrKA34baU50_x-X3x_pg53Tlgoq1wg6Z6szpl-E3TvTE89EhagZfoUk2jlXILy3aptI5vhNc-GGPJu8Iy1j2n8SVU9LoZNr9Y1qp17sFaghmPEm3tkBzdmgtTNwx9x-tgu7fU9BEmy-0c25ih87Wyk94SZLNw-OWgp8pYL1vSXsmpAw95p5AAdYgbE6VsgTKsBE-IL4k6rj1CoihTx7ZA2jT0tbLM2EqYFs"/>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-surface-container-lowest/80 border-t border-songket-gold/20 backdrop-blur-xl shadow-[0_-10px_40px_rgba(138,109,42,0.2)] rounded-t-xl">
<div class="flex flex-col items-center justify-center text-songket-gold/40">
<span class="material-symbols-outlined mb-1">auto_stories</span>
<span class="font-eyebrow-label text-[10px]">ARKIB</span>
</div>
<div class="flex flex-col items-center justify-center text-songket-gold/40">
<span class="material-symbols-outlined mb-1">mail</span>
<span class="font-eyebrow-label text-[10px]">WARKAH</span>
</div>
<div class="flex flex-col items-center justify-center text-songket-gold scale-110 transition-transform">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">event_available</span>
<span class="font-eyebrow-label text-[10px]">RSVP</span>
</div>
<div class="flex flex-col items-center justify-center text-songket-gold/40">
<span class="material-symbols-outlined mb-1">map</span>
<span class="font-eyebrow-label text-[10px]">LOKASI</span>
</div>
</nav>
</body></html>
