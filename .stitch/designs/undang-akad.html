<body class="bg-indigo-night text-on-surface font-body-main selection:bg-songket-gold/30">
<!-- Top Navigation Shell -->
<header class="fixed top-0 w-full z-50 backdrop-blur-md bg-surface/30 shadow-[0_4px_30px_rgba(201,162,78,0.15)] flex justify-between items-center px-gutter-mobile py-4 reveal-3d">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-songket-gold" data-icon="unfold_more">unfold_more</span>
<h1 class="font-hero-title text-body-main-mobile text-songket-gold tracking-[0.2em]">Warkah Persada</h1>
</div>
<button class="text-songket-gold">
<span class="material-symbols-outlined" data-icon="music_note">music_note</span>
</button>
</header>
<main class="relative min-h-screen pt-24 pb-32 overflow-hidden bg-gradient-to-b from-indigo-twilight to-indigo-night">
<!-- Background Ornaments & Gold Dust -->
<div class="absolute inset-0 songket-overlay pointer-events-none"></div>
<div class="absolute top-1/4 left-1/4 w-32 h-32 gold-dust animate-pulse"></div>
<div class="absolute bottom-1/4 right-1/4 w-48 h-48 gold-dust animate-pulse delay-700"></div>
<section class="container mx-auto px-gutter-mobile flex flex-col items-start gap-y-10">
<!-- Asymmetric Header Block -->
<div class="w-full flex flex-col items-start reveal-3d space-y-4">
<span class="font-eyebrow-label text-eyebrow-label-mobile text-songket-gold uppercase">AKAD NIKAH</span>
<div class="text-songket-gold opacity-80">
<svg fill="currentColor" height="32" viewbox="0 0 40 40" width="32" xmlns="http://www.w3.org/2000/svg">
<path d="M20 0L24 16L40 20L24 24L20 40L16 24L0 20L16 16L20 0Z"></path>
</svg>
</div>
<div class="flex flex-col">
<h2 class="font-section-title text-champagne-gold italic text-[clamp(48px,12vw,64px)] leading-none -ml-1">9:00 PAGI</h2>
<p class="font-section-sub text-section-sub-mobile text-warm-ivory italic mt-2">Sabtu, 14 Mei 2026</p>
</div>
</div>
<!-- Glass Card Panel - Asymmetric Right Shift -->
<div class="w-full max-w-[340px] ml-auto reveal-3d">
<div class="glass-card relative p-8 rounded-[14px] border border-songket-gold/30 shadow-[0_10px_40px_rgba(201,162,78,0.2)]">
<!-- Pucuk Rebung Corners -->
<div class="absolute top-0 left-0 p-2 text-songket-gold/40">
<svg fill="currentColor" height="24" viewbox="0 0 40 40" width="24"><path d="M20 0L24 16L40 20L24 24L20 40L16 24L0 20L16 16L20 0Z"></path></svg>
</div>
<div class="absolute top-0 right-0 p-2 text-songket-gold/40 rotate-90">
<svg fill="currentColor" height="24" viewbox="0 0 40 40" width="24"><path d="M20 0L24 16L40 20L24 24L20 40L16 24L0 20L16 16L20 0Z"></path></svg>
</div>
<div class="absolute bottom-0 left-0 p-2 text-songket-gold/40 -rotate-90">
<svg fill="currentColor" height="24" viewbox="0 0 40 40" width="24"><path d="M20 0L24 16L40 20L24 24L20 40L16 24L0 20L16 16L20 0Z"></path></svg>
</div>
<div class="absolute bottom-0 right-0 p-2 text-songket-gold/40 rotate-180">
<svg fill="currentColor" height="24" viewbox="0 0 40 40" width="24"><path d="M20 0L24 16L40 20L24 24L20 40L16 24L0 20L16 16L20 0Z"></path></svg>
</div>
<!-- Card Content -->
<div class="flex flex-col space-y-6 relative z-10">
<div class="space-y-2">
<h3 class="font-section-title text-warm-ivory italic text-xl leading-tight">MASJID SULTAN SALAHUDDIN ABDUL AZIZ SHAH</h3>
<div class="h-px w-12 bg-songket-gold/30"></div>
</div>
<div class="font-section-sub text-gold-shadow italic text-base flex flex-col gap-1">
<span>Persiaran Masjid</span>
<span>Seksyen 14, 40000 Shah Alam</span>
<span>Selangor Darul Ehsan</span>
</div>
</div>
</div>
<!-- Action Buttons Stacking -->
<div class="mt-8 flex flex-col gap-4">
<button class="w-full h-14 bg-gradient-to-r from-champagne-gold to-songket-gold rounded-full flex items-center justify-center gap-3 shadow-[0_6px_12px_rgba(201,162,78,0.25)] transition-transform active:scale-95">
<span class="material-symbols-outlined text-indigo-night text-lg" data-icon="location_on">location_on</span>

</button>

<span class="material-symbols-outlined text-songket-gold text-lg" data-icon="calendar_month">calendar_month</span>
<span class="font-eyebrow-label text-songket-gold font-bold">TAMBAH KE KALENDAR</span>
</button>
</div>
</div>
</section>
</main>

<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] rounded-full z-50 bg-surface-container-low/80 border border-songket-gold/30 backdrop-blur-lg shadow-[0_10px_40px_rgba(201,162,78,0.2)] flex justify-around items-center px-4 py-2 reveal-3d">

</button>

</button>

<span class="material-symbols-outlined" data-icon="location_on">location_on</span>
</button>
<button class="text-on-surface-variant p-3 opacity-60 hover:opacity-100 hover:scale-105 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="edit_note">edit_note</span>

<div class="fixed inset-0 pointer-events-none ring-[100px] ring-inset ring-black/20 mix-blend-multiply"></div>
