<style>
        .reveal-3d {
            opacity: 0;
            transform: translateY(30px) rotateX(-10deg);
            animation: reveal 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }
        @keyframes reveal {
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0);
            }
        }
        .gold-dust {
            background-image: 
                radial-gradient(circle, #e8c775 1px, transparent 1px),
                radial-gradient(circle, #c9a24e 1.5px, transparent 1.5px);
            background-size: 80px 80px, 120px 120px;
            animation: drift 20s linear infinite;
        }
        @keyframes drift {
            from { background-position: 0 0; }
            to { background-position: 100px 500px; }
        }
        .pucuk-rebung {
            fill: #c9a24e;
            filter: drop-shadow(0 2px 4px rgba(138, 109, 42, 0.4));
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
