<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-motion.my Production Codebase</title>
<style>
:root{
  --bg:#1e1e2e;--bg2:#2a2a3e;--bg3:#313145;--border:#3e3e56;
  --text:#cdd6f4;--text2:#a6adc8;--text3:#6c7086;
  --gold:#c9a24e;--gold-lt:#e8c775;
  --green:#a6e3a1;--red:#f38ba8;--blue:#89b4fa;--mauve:#cba6f7;--peach:#fab387;--teal:#94e2d5;--yellow:#f9e2af;
  --r:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Menlo','Monaco','Courier New',monospace;background:var(--bg);color:var(--text);font-size:12px;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh}

/* FILE TREE */
.tree{width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.tree-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.tree-head-logo{font-size:12px;font-weight:700;color:var(--gold)}
.tree-head-title{font-size:10px;color:var(--text3);margin-left:auto}
.tree-search{margin:8px 10px;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:10px;outline:none}
.tree-search:focus{border-color:var(--gold)}
.tree-search::placeholder{color:var(--text3)}
.tree-body{flex:1;overflow-y:auto;padding:4px 0;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.tree-folder{user-select:none}
.tree-folder-head{display:flex;align-items:center;gap:4px;padding:3px 10px 3px 0;cursor:pointer;font-size:11px;color:var(--text2);transition:color .1s}
.tree-folder-head:hover{color:var(--text)}
.tree-folder-arrow{width:16px;text-align:center;font-size:8px;color:var(--text3);transition:transform .15s;flex-shrink:0}
.tree-folder.open>.tree-folder-head>.tree-folder-arrow{transform:rotate(90deg)}
.tree-folder-icon{margin-right:2px}
.tree-folder-children{display:none;padding-left:12px}
.tree-folder.open>.tree-folder-children{display:block}
.tree-file{display:flex;align-items:center;gap:4px;padding:3px 10px 3px 28px;cursor:pointer;font-size:11px;color:var(--text3);transition:all .1s;border-radius:0}
.tree-file:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tree-file.active{color:var(--gold);background:rgba(201,162,78,.08)}
.tree-file-icon{font-size:10px;flex-shrink:0}
.file-ts{color:var(--blue)}
.file-tsx{color:var(--teal)}
.file-css{color:var(--mauve)}
.file-json{color:var(--yellow)}
.file-sql{color:var(--green)}
.file-env{color:var(--peach)}
.file-md{color:var(--text2)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tab-bar{height:36px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:stretch;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:0 14px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;cursor:pointer;border-right:1px solid var(--border);white-space:nowrap;transition:all .1s;position:relative}
.tab:hover{color:var(--text2);background:rgba(255,255,255,.02)}
.tab.active{color:var(--text);background:var(--bg)}
.tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold)}
.tab-close{font-size:12px;opacity:.4;margin-left:4px}
.tab-close:hover{opacity:1}
.code-area{flex:1;overflow:auto;padding:0;position:relative}
.code-wrap{display:flex;min-height:100%}
.line-nums{padding:12px 0;text-align:right;color:var(--text3);font-size:11px;line-height:1.7;user-select:none;min-width:44px;padding-right:12px;background:var(--bg);border-right:1px solid var(--border);position:sticky;left:0;z-index:2}
.code-content{padding:12px 16px;font-size:11px;line-height:1.7;white-space:pre;flex:1;overflow-x:auto}

/* SYNTAX COLORS */
.s-kw{color:var(--mauve)}
.s-str{color:var(--green)}
.s-num{color:var(--peach)}
.s-fn{color:var(--blue)}
.s-cm{color:var(--text3);font-style:italic}
.s-type{color:var(--yellow)}
.s-tag{color:var(--red)}
.s-attr{color:var(--peach)}
.s-prop{color:var(--teal)}
.s-op{color:var(--text2)}
.s-imp{color:var(--mauve)}

/* STATUS BAR */
.status-bar{height:24px;background:var(--gold);display:flex;align-items:center;padding:0 12px;gap:16px;flex-shrink:0}
.status-item{font-size:9px;color:var(--bg);font-weight:600;letter-spacing:.03em}

/* BREADCRUMB */
.breadcrumb{padding:6px 16px;font-size:10px;color:var(--text3);background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:4px;flex-shrink:0}
.breadcrumb span{color:var(--text2)}

/* COPY BUTTON */
.copy-btn{position:absolute;top:8px;right:16px;padding:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-family:inherit;font-size:9px;cursor:pointer;z-index:5;transition:all .15s}
.copy-btn:hover{border-color:var(--gold);color:var(--gold)}

/* SETUP PANEL */
.setup-panel{display:none;padding:20px;overflow-y:auto;flex:1}
.setup-panel.active{display:block}
.setup-section{margin-bottom:24px}
.setup-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:8px}
.setup-text{font-size:11px;color:var(--text2);line-height:1.7;margin-bottom:8px}
.setup-code{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;font-size:11px;line-height:1.7;color:var(--green);margin-bottom:12px;overflow-x:auto;white-space:pre}

@media(max-width:800px){.tree{width:200px}}
@media print{
  .tree,.tab-bar,.status-bar,.copy-btn,.breadcrumb{display:none!important}
  .code-area{overflow:visible!important}
  .code-content{white-space:pre-wrap;word-wrap:break-word}
}
</style>
</head>

FILES['supabase/schema.sql'] = {type:'sql', content:
`-- e-motion.my Database Schema
-- Run: supabase db push

-- Enable UUID
create extension if not exists "uuid-ossp";

-- ============================================
-- USERS (extends Supabase Auth)
-- ============================================
create table public.profiles (
  id uuid references auth.users on delete cascade primary key,
  email text not null,
  full_name text,
  role text check (role in ('couple', 'planner', 'admin')) default 'couple',
  created_at timestamptz default now(),
  updated_at timestamptz default now()
);

alter table public.profiles enable row level security;

create policy "Users can read own profile"
  on public.profiles for select using (auth.uid() = id);

create policy "Users can update own profile"
  on public.profiles for update using (auth.uid() = id);

-- Auto-create profile on signup
create or replace function public.handle_new_user()
returns trigger as $$
begin
  insert into public.profiles (id, email, full_name)
  values (
    new.id,
    new.email,
    coalesce(new.raw_user_meta_data->>'full_name', split_part(new.email, '@', 1))
  );
  return new;
end;
$$ language plpgsql security definer;

create trigger on_auth_user_created
  after insert on auth.users
  for each row execute function public.handle_new_user();

-- ============================================
-- INVITATIONS
-- ============================================
create table public.invitations (
  id uuid default uuid_generate_v4() primary key,
  user_id uuid references public.profiles(id) on delete cascade not null,
  slug text unique not null,
  template text not null default 'songket-biru',
  plan text check (plan in ('free', 'motion', 'cinematic')) default 'free',
  status text check (status in ('draft', 'active', 'expired')) default 'draft',
  card_data jsonb not null default '{}',
  events jsonb not null default '[]',
  sections jsonb not null default '{}',
  views_count int default 0,
  shares_count int default 0,
  expires_at timestamptz,
  created_at timestamptz default now(),
  updated_at timestamptz default now()
);

alter table public.invitations enable row level security;

create policy "Users can CRUD own invitations"
  on public.invitations for all using (auth.uid() = user_id);

create policy "Public can read active invitations by slug"
  on public.invitations for select using (status = 'active');

-- Generate unique slug
create or replace function generate_slug(bride text, groom text)
returns text as $$
declare
  base_slug text;
  final_slug text;
  counter int := 0;
begin
  base_slug := lower(regexp_replace(bride || '-' || groom, '[^a-z0-9]+', '-', 'gi'));
  final_slug := base_slug || '-' || extract(year from now());
  while exists (select 1 from public.invitations where slug = final_slug) loop
    counter := counter + 1;
    final_slug := base_slug || '-' || extract(year from now()) || '-' || counter;
  end loop;
  return final_slug;
end;
$$ language plpgsql;

-- ============================================
-- RSVP RESPONSES
-- ============================================
create table public.rsvp_responses (
  id uuid default uuid_generate_v4() primary key,
  invitation_id uuid references public.invitations(id) on delete cascade not null,
  guest_name text not null,
  status text check (status in ('attending', 'declined', 'maybe')) not null,
  pax int default 1,
  message text,
  created_at timestamptz default now()
);

alter table public.rsvp_responses enable row level security;

create policy "Anyone can insert RSVP"
  on public.rsvp_responses for insert with check (true);

create policy "Invitation owner can read RSVPs"
  on public.rsvp_responses for select using (
    invitation_id in (select id from public.invitations where user_id = auth.uid())
  );

-- ============================================
-- WISHES
-- ============================================
create table public.wishes (
  id uuid default uuid_generate_v4() primary key,
  invitation_id uuid references public.invitations(id) on delete cascade not null,
  author text not null,
  message text not null,
  approved boolean default false,
  created_at timestamptz default now()
);

alter table public.wishes enable row level security;

create policy "Anyone can insert wishes"
  on public.wishes for insert with check (true);

create policy "Public can read approved wishes"
  on public.wishes for select using (approved = true);

create policy "Owner can read all wishes"
  on public.wishes for select using (
    invitation_id in (select id from public.invitations where user_id = auth.uid())
  );

create policy "Owner can update wishes"
  on public.wishes for update using (
    invitation_id in (select id from public.invitations where user_id = auth.uid())
  );

-- ============================================
-- PAYMENTS
-- ============================================
create table public.payments (
  id uuid default uuid_generate_v4() primary key,
  user_id uuid references public.profiles(id) on delete cascade not null,
  invitation_id uuid references public.invitations(id) on delete cascade not null,
  billplz_bill_id text unique,
  amount int not null, -- in cents
  plan text not null,
  status text check (status in ('pending', 'paid', 'failed')) default 'pending',
  paid_at timestamptz,
  created_at timestamptz default now()
);

alter table public.payments enable row level security;

create policy "Users can read own payments"
  on public.payments for select using (auth.uid() = user_id);

-- ============================================
-- MEDIA
-- ============================================
create table public.media (
  id uuid default uuid_generate_v4() primary key,
  invitation_id uuid references public.invitations(id) on delete cascade not null,
  type text check (type in ('photo', 'music', 'video')) not null,
  storage_path text not null,
  sort_order int default 0,
  created_at timestamptz default now()
);

alter table public.media enable row level security;

create policy "Owner can CRUD media"
  on public.media for all using (
    invitation_id in (select id from public.invitations where user_id = auth.uid())
  );

create policy "Public can read media for active cards"
  on public.media for select using (
    invitation_id in (select id from public.invitations where status = 'active')
  );`};

`import { createServerClient } from '@supabase/ssr'
import { cookies } from 'next/headers'

export async function createClient() {
  const cookieStore = await cookies()

  return createServerClient(
    process.env.NEXT_PUBLIC_SUPABASE_URL!,
    process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY!,
    {
      cookies: {
        getAll() {
          return cookieStore.getAll()
        },
        setAll(cookiesToSet) {
          cookiesToSet.forEach(({ name, value, options }) =>
            cookieStore.set(name, value, options)
          )
        },
      },
    }
  )
}`};

`// Billplz Payment Integration
// Docs: https://www.billplz.com/api

const BILLPLZ_API = 'https://www.billplz-sandbox.com/api/v3'

interface CreateBillParams {
  collection_id: string
  email: string
  name: string
  amount: number // in cents
  callback_url: string
  redirect_url: string
  description: string
  reference_1_label: string
  reference_1: string
}

export async function createBill(params: CreateBillParams) {
  const response = await fetch(\`\${BILLPLZ_API}/bills\`, {
    method: 'POST',
    headers: {
      'Authorization': \`Basic \${btoa(process.env.BILLPLZ_API_KEY + ':')}\`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(params),
  })

  if (!response.ok) {
    throw new Error(\`Billplz error: \${response.status}\`)
  }

  return response.json()
}

export function verifyWebhook(body: Record<string, string>, signature: string): boolean {
  // Verify X-Signature header using BILLPLZ_SIGNATURE_KEY
  // Implementation depends on crypto library
  const keys = Object.keys(body).sort()
  const source = keys.map(k => \`\${k}\${body[k]}\`).join('|')
  // In production: compare HMAC-SHA256 of source with signature

}

  const { slug } = await params
  const supabase = await createClient()
  const { data: invitation } = await supabase
    .from('invitations')
    .select('card_data, template')
    .eq('slug', slug)
    .eq('status', 'active')
    .single()

  if (!invitation) return { title: 'e-motion.my' }

  const card = invitation.card_data as { bride: string; groom: string }
  return {
    title: \`\${card.bride} & \${card.groom} — e-motion.my\`,
    description: \`Kad jemputan perkahwinan \${card.bride} & \${card.groom}\`,
    openGraph: {
      title: \`\${card.bride} & \${card.groom}\`,
      description: 'Kad jemputan digital perkahwinan',
      siteName: 'e-motion.my',
    },
  }
}

export default async function GuestCardPage({ params }: Props) {
  const { slug } = await params
  const supabase = await createClient()

  // Fetch invitation
  const { data: invitation, error } = await supabase
    .from('invitations')
    .select('*')
    .eq('slug', slug)
    .eq('status', 'active')
    .single()

  if (error || !invitation) notFound()

  // Increment view count
  await supabase
    .from('invitations')
    .update({ views_count: (invitation.views_count || 0) + 1 })
    .eq('id', invitation.id)

  // Fetch approved wishes
  const { data: wishes } = await supabase
    .from('wishes')
    .select('*')
    .eq('invitation_id', invitation.id)
    .eq('approved', true)
    .order('created_at', { ascending: false })

  // Fetch media
  const { data: media } = await supabase
    .from('media')
    .select('*')
    .eq('invitation_id', invitation.id)
    .order('sort_order')

  // Get template config
  const template = getTemplate(invitation.template)

  return (
    <CardRenderer
      invitation={invitation}
      template={template}
      wishes={wishes || []}
      media={media || []}
    />
  )
}`};

        delay: 0.3,
      })
    }
  }, [isOpen])

`import { NextRequest, NextResponse } from 'next/server'
import { createClient } from '@supabase/supabase-js'
import { verifyWebhook } from '@/lib/billplz'

// Use service role for webhook (no user session)
const supabase = createClient(
  process.env.NEXT_PUBLIC_SUPABASE_URL!,
  process.env.SUPABASE_SERVICE_ROLE_KEY!
)

export async function POST(request: NextRequest) {
  const body = await request.json()
  const signature = request.headers.get('x-signature') || ''

  // Verify webhook signature
  if (!verifyWebhook(body, signature)) {
    return NextResponse.json({ error: 'Invalid signature' }, { status: 401 })
  }

  const { id: billplz_id, paid, paid_at } = body

  if (!paid) {
    // Payment failed
    await supabase
      .from('payments')
      .update({ status: 'failed' })
      .eq('billplz_bill_id', billplz_id)

    return NextResponse.json({ ok: true })
  }

  // Payment successful — activate the card
  const { data: payment } = await supabase
    .from('payments')
    .select('*')
    .eq('billplz_bill_id', billplz_id)
    .single()

  if (!payment) {
    return NextResponse.json({ error: 'Payment not found' }, { status: 404 })
  }

  // Update payment status
  await supabase
    .from('payments')
    .update({ status: 'paid', paid_at })
    .eq('id', payment.id)

  // Calculate expiry based on plan
  const months = payment.plan === 'cinematic' ? 24 : 12
  const expiresAt = new Date()
  expiresAt.setMonth(expiresAt.getMonth() + months)

  // Activate the invitation
  await supabase
    .from('invitations')
    .update({
      status: 'active',
      plan: payment.plan,
      expires_at: expiresAt.toISOString(),
    })
    .eq('id', payment.invitation_id)

  // TODO: Send receipt email via Resend
  // TODO: Send WhatsApp notification

  return NextResponse.json({ ok: true })
}`};

  const body = await request.json()

  const parsed = rsvpSchema.safeParse(body)
  if (!parsed.success) {
    return NextResponse.json(
      { error: 'Invalid data', details: parsed.error.issues },
      { status: 400 }
    )
  }

  // Verify invitation exists and is active

    .from('invitations')

    )
  }

  // Insert RSVP

    .from('rsvp_responses')
    .insert(parsed.data)
    .select()
    .single()

  if (error) {
    return NextResponse.json({ error: error.message }, { status: 500 })
  }

`import { NextRequest, NextResponse } from 'next/server'
import { createClient } from '@/lib/supabase/server'

export async function GET(request: NextRequest) {
  const { searchParams } = new URL(request.url)
  const invitationId = searchParams.get('invitation_id')

  if (!invitationId) {
    return NextResponse.json({ error: 'Missing invitation_id' }, { status: 400 })
  }

  const supabase = await createClient()

  // Verify ownership
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) {
    return NextResponse.json({ error: 'Unauthorized' }, { status: 401 })
  }

  const { data: invitation } = await supabase
    .from('invitations')
    .select('id')
    .eq('id', invitationId)
    .eq('user_id', user.id)
    .single()

  if (!invitation) {
    return NextResponse.json({ error: 'Not found' }, { status: 404 })
  }

  // Fetch RSVPs
  const { data: rsvps } = await supabase
    .from('rsvp_responses')
    .select('*')
    .eq('invitation_id', invitationId)
    .order('created_at')

  // Generate CSV
  const headers = ['Nama', 'Status', 'Bilangan', 'Tarikh']
  const rows = (rsvps || []).map(r => [
    r.guest_name,
    r.status === 'attending' ? 'Hadir' : r.status === 'maybe' ? 'Mungkin' : 'Tidak Hadir',
    r.pax.toString(),
    new Date(r.created_at).toLocaleString('ms-MY'),
  ])

  const csv = [headers, ...rows].map(r => r.map(c => \`"\${c}"\`).join(',')).join('\\n')

  return new NextResponse(csv, {
    headers: {
      'Content-Type': 'text/csv; charset=utf-8',
      'Content-Disposition': \`attachment; filename="rsvp-\${invitationId}.csv"\`,
    },
  })
}`};

`import { createServerClient } from '@supabase/ssr'
import { NextResponse, type NextRequest } from 'next/server'

export async function middleware(request: NextRequest) {
  let supabaseResponse = NextResponse.next({ request })

  const supabase = createServerClient(
    process.env.NEXT_PUBLIC_SUPABASE_URL!,
    process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY!,
    {
      cookies: {
        getAll() {
          return request.cookies.getAll()
        },
        setAll(cookiesToSet) {
          cookiesToSet.forEach(({ name, value }) =>
            request.cookies.set(name, value)
          )
          supabaseResponse = NextResponse.next({ request })
          cookiesToSet.forEach(({ name, value, options }) =>
            supabaseResponse.cookies.set(name, value, options)
          )
        },
      },
    }
  )

  const { data: { user } } = await supabase.auth.getUser()

  // Protect dashboard routes
  if (request.nextUrl.pathname.startsWith('/dashboard') && !user) {
    const url = request.nextUrl.clone()
    url.pathname = '/auth/login'
    url.searchParams.set('redirect', request.nextUrl.pathname)
    return NextResponse.redirect(url)
  }

  return supabaseResponse
}

export const config = {
  matcher: ['/dashboard/:path*'],
}`};

`import { createClient } from '@/lib/supabase/server'
import { NextRequest, NextResponse } from 'next/server'

export async function GET(request: NextRequest) {
  const { searchParams, origin } = new URL(request.url)
  const code = searchParams.get('code')
  const redirect = searchParams.get('redirect') || '/dashboard'

  if (code) {
    const supabase = await createClient()
    await supabase.auth.exchangeCodeForSession(code)
  }

  return NextResponse.redirect(\`\${origin}\${redirect}\`)
}`};

  const ref = useRef<HTMLDivElement>(null)

    const container = ref.current
    const petalColors = [

        height: (size * 1.4) + 'px',
        borderRadius: '50% 50% 50% 0',

`'use client'

import { useEffect, useState } from 'react'

interface Props {
  targetDate: string
  colors: Record<string, any>
}

export function CountdownSection({ targetDate, colors: c }: Props) {
  const [time, setTime] = useState({ d: 0, h: 0, m: 0, s: 0 })

  useEffect(() => {
    const target = new Date(targetDate).getTime()
    function tick() {
      const diff = Math.max(0, target - Date.now())
      setTime({
        d: Math.floor(diff / 86400000),
        h: Math.floor((diff % 86400000) / 3600000),
        m: Math.floor((diff % 3600000) / 60000),
        s: Math.floor((diff % 60000) / 1000),
      })
    }
    tick()
    const iv = setInterval(tick, 1000)
    return () => clearInterval(iv)
  }, [targetDate])

  const labels = ['Hari', 'Jam', 'Min', 'Saat']
  const values = [time.d, time.h, time.m, time.s]

  const bgColor = c.bgGradient?.[c.bgGradient.length - 1] || '#4a1020'

  return (
    <section style={{
      padding: '28px 24px',
      background: \`linear-gradient(135deg, \${bgColor}, \${c.bgGradient?.[0] || '#1a2040'})\`,
      color: c.text,

        {values.map((v, i) => (
          <div key={i} style={{
            padding: '12px 6px',
            background: \`rgba(\${hexToRgb(c.accent)}, 0.08)\`,
            border: \`1px solid rgba(\${hexToRgb(c.accent)}, 0.2)\`,
            borderRadius: 4,
          }}>
            <div style={{ fontFamily: 'Georgia, serif', fontSize: 28, color: c.accent, lineHeight: 1 }}>
              {v < 10 ? '0' + v : v}
            </div>

              {labels[i]}
            </div>
          </div>
        ))}
      </div>
    </section>
  )
}

function hexToRgb(hex: string): string {

              borderRadius: 8, padding: 24, cursor: 'pointer',
              position: 'relative',
              transition: 'border-color 0.2s',
            }}
          >
            {selected === plan.id && (
              <div style={{
                position: 'absolute', top: 10, right: 10, width: 22, height: 22,
                background: '#c9a24e', color: '#1a2040', borderRadius: '50%',

            <div style={{ fontFamily: 'Georgia, serif', fontSize: 20, marginBottom: 4 }}>{plan.name}</div>
            <div style={{ fontSize: 32, fontWeight: 700, fontFamily: 'system-ui', marginBottom: 4 }}>
              <sup style={{ fontSize: 14, fontWeight: 400 }}>RM</sup>{plan.price}
            </div>
            <div style={{ fontSize: 11, color: '#a8a29e', marginBottom: 16, fontFamily: 'system-ui' }}>
              Bayar sekali &middot; aktif {plan.duration}

`import { NextRequest, NextResponse } from 'next/server'
import { createClient } from '@/lib/supabase/server'
import { createBill, PLANS } from '@/lib/billplz'

export async function POST(request: NextRequest) {
  const supabase = await createClient()
  const { data: { user } } = await supabase.auth.getUser()

  if (!user) {
    return NextResponse.json({ error: 'Unauthorized' }, { status: 401 })
  }

  const body = await request.json()
  const { payment_id, plan, email, name } = body

  const planConfig = PLANS[plan as keyof typeof PLANS]
  if (!planConfig) {
    return NextResponse.json({ error: 'Invalid plan' }, { status: 400 })
  }

  const appUrl = process.env.NEXT_PUBLIC_APP_URL || 'http://localhost:3000'

  // Create Billplz bill
  const bill = await createBill({
    collection_id: process.env.BILLPLZ_COLLECTION_ID!,
    email,
    name,
    amount: planConfig.amount,
    callback_url: \`\${appUrl}/api/webhooks/billplz\`,
    redirect_url: \`\${appUrl}/dashboard?payment=success\`,
    description: \`e-motion.my \${planConfig.label} Plan\`,
    reference_1_label: 'Payment ID',
    reference_1: payment_id,
  })

  // Store Billplz bill ID
  await supabase
    .from('payments')
    .update({ billplz_bill_id: bill.id })
    .eq('id', payment_id)

  return NextResponse.json({ url: bill.url })
}`};

`import { NextRequest, NextResponse } from 'next/server'
import { createClient } from '@supabase/supabase-js'
import { z } from 'zod'

const supabase = createClient(
  process.env.NEXT_PUBLIC_SUPABASE_URL!,
  process.env.SUPABASE_SERVICE_ROLE_KEY!
)

const wishSchema = z.object({
  invitation_id: z.string().uuid(),
  author: z.string().min(1).max(100),
  message: z.string().min(1).max(500),
})

export async function POST(request: NextRequest) {
  const body = await request.json()
  const parsed = wishSchema.safeParse(body)

  if (!parsed.success) {
    return NextResponse.json(
      { error: 'Invalid data', details: parsed.error.issues },
      { status: 400 }
    )
  }

  // Verify invitation exists and is active
  const { data: inv } = await supabase
    .from('invitations')
    .select('id')
    .eq('id', parsed.data.invitation_id)
    .eq('status', 'active')
    .single()

  if (!inv) {
    return NextResponse.json({ error: 'Invitation not found' }, { status: 404 })
  }

  const { data, error } = await supabase
    .from('wishes')
    .insert({ ...parsed.data, approved: false })
    .select()
    .single()

  if (error) {
    return NextResponse.json({ error: error.message }, { status: 500 })
  }

  return NextResponse.json({ ok: true, wish: data })
}`};

// ===== BUILD TREE =====
function buildTree(){
  var tree = {};
  Object.keys(FILES).sort().forEach(function(path){
    var parts = path.split('/');
    var current = tree;
    for(var i=0;i<parts.length-1;i++){
      if(!current[parts[i]]) current[parts[i]] = {};
      current = current[parts[i]];
    }
    current[parts[parts.length-1]] = FILES[path];
  });
  return tree;
}

function renderTree(node, parentPath, depth){
  var html = '';
  var entries = Object.entries(node).sort(function(a,b){
    var aIsDir = typeof a[1] === 'object' && !a[1].content;
    var bIsDir = typeof b[1] === 'object' && !b[1].content;
    if(aIsDir && !bIsDir) return -1;
    if(!aIsDir && bIsDir) return 1;
    return a[0].localeCompare(b[0]);
  });

  entries.forEach(function(entry){
    var name = entry[0];

    var fullPath = parentPath ? parentPath+'/'+name : name;
    var pad = depth * 12;

    if(val.content !== undefined){

    } else {
      // Folder

      html += '<div class="tree-folder-children">'+renderTree(val, fullPath, depth+1)+'</div></div>';
    }
  });
  return html;
}
