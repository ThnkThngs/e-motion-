<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-motion.my Dashboard</title>
<style>
:root{
  --bg:#fafaf9;--bg2:#f5f5f4;--bg3:#fff;--border:#e7e5e4;--border2:#d6d3d1;
  --text:#1c1917;--text2:#57534e;--text3:#a8a29e;
  --brand:#1a2040;--brand2:#2a3460;--accent:#c9a24e;--accent2:#e8c775;
  --green:#16a34a;--green-bg:#f0fdf4;--red:#dc2626;--red-bg:#fef2f2;
  --blue:#2563eb;--blue-bg:#eff6ff;--orange:#ea580c;--orange-bg:#fff7ed;
  --purple:#7c3aed;--purple-bg:#f5f3ff;
  --sidebar-w:220px;--topbar-h:49px;
  --radius:6px;--shadow:0 1px 3px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--brand);color:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;scrollbar-width:none}
.sidebar::-webkit-scrollbar{display:none}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--topbar-h);border-bottom:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:24px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

/* SIDEBAR */
.sb-brand{padding:16px 18px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo{font-size:15px;font-weight:600;letter-spacing:-.02em;color:#fff}
.sb-logo span{color:var(--accent);font-weight:400}
.sb-badge{font-size:9px;letter-spacing:.08em;text-transform:uppercase;background:var(--accent);color:var(--brand);padding:2px 6px;border-radius:3px;font-weight:700;margin-left:auto}

.sb-role-switch{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-role-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px;font-weight:600}
.sb-roles{display:flex;flex-direction:column;gap:2px}
.sb-role{padding:7px 10px;border-radius:4px;font-size:12px;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;border:none;background:none;text-align:left;width:100%;font-family:inherit;display:flex;align-items:center;gap:8px}
.sb-role:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-role.active{background:rgba(201,162,78,.15);color:var(--accent2);font-weight:500}
.sb-role-icon{width:18px;text-align:center;font-size:13px}

.sb-nav{padding:8px 10px;flex:1}
.sb-nav-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.3);margin:12px 4px 6px;font-weight:600}
.sb-nav-label:first-child{margin-top:4px}
.sb-link{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:4px;font-size:12px;color:rgba(255,255,255,.55);cursor:pointer;transition:all .15s;position:relative}
.sb-link:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.sb-link.active{background:rgba(255,255,255,.1);color:#fff;font-weight:500}
.sb-link-icon{width:18px;text-align:center;font-size:13px;opacity:.7}
.sb-link-badge{margin-left:auto;font-size:10px;background:var(--accent);color:var(--brand);padding:1px 6px;border-radius:10px;font-weight:700;min-width:20px;text-align:center}

.sb-footer{padding:12px 14px;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.sb-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--brand);flex-shrink:0}
.sb-user-info{min-width:0}
.sb-user-name{font-size:12px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-email{font-size:10px;color:rgba(255,255,255,.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* TOPBAR */
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-breadcrumb{font-size:12px;color:var(--text2)}
.topbar-breadcrumb strong{color:var(--text);font-weight:600}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-search{padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text);background:var(--bg);width:200px;outline:none;transition:border-color .2s}
.topbar-search:focus{border-color:var(--accent)}
.topbar-search::placeholder{color:var(--text3)}
.topbar-btn{padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;background:var(--bg3);color:var(--text);font-family:inherit}
.topbar-btn:hover{border-color:var(--border2);background:var(--bg2)}
.topbar-btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.topbar-btn.primary:hover{background:var(--brand2)}

/* CARDS / STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
.stat-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:4px}
.stat-value{font-size:28px;font-weight:700;letter-spacing:-.02em;color:var(--text);line-height:1.2}
.stat-value span{font-size:14px;font-weight:400;color:var(--text3)}
.stat-change{font-size:11px;margin-top:4px;font-weight:500}
.stat-change.up{color:var(--green)}
.stat-change.down{color:var(--red)}

/* TABLE */
.table-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:24px}
.table-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.table-title{font-size:13px;font-weight:600;color:var(--text)}
.table-actions{display:flex;gap:6px}
.filter-btn{padding:4px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:11px;cursor:pointer;background:var(--bg3);color:var(--text2);font-family:inherit;transition:all .15s}
.filter-btn:hover,.filter-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
table{width:100%;border-collapse:collapse}
thead{background:var(--bg)}
th{padding:8px 16px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-weight:600;text-align:left;border-bottom:1px solid var(--border)}
td{padding:10px 16px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;letter-spacing:.03em}
.tag.green{background:var(--green-bg);color:var(--green)}
.tag.red{background:var(--red-bg);color:var(--red)}
.tag.blue{background:var(--blue-bg);color:var(--blue)}
.tag.orange{background:var(--orange-bg);color:var(--orange)}
.tag.purple{background:var(--purple-bg);color:var(--purple)}
.tag.gray{background:var(--bg2);color:var(--text3)}

/* AVATAR */
.avatar-sm{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.cell-user{display:flex;align-items:center;gap:8px}

/* SECTION HEADERS */
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.section-desc{font-size:12px;color:var(--text3);margin-top:2px}

/* GRID CARDS */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-body{padding:18px 20px}
.card-footer{padding:10px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.card-footer-text{font-size:11px;color:var(--text3)}

/* CHART WRAPPER */
.chart-wrap{height:200px;position:relative}

/* PROGRESS BAR */
.progress-wrap{margin-top:8px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px}
.progress-bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* RSVP GRID */
.rsvp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.rsvp-card{border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;background:var(--bg3)}
.rsvp-card-name{font-size:13px;font-weight:600;margin-bottom:2px}
.rsvp-card-detail{font-size:11px;color:var(--text3)}

/* WISH CARD */
.wish-card{border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;background:var(--bg3);margin-bottom:10px}
.wish-card-text{font-size:12px;color:var(--text);font-style:italic;margin-bottom:6px;line-height:1.5}
.wish-card-author{font-size:11px;color:var(--text3);font-weight:500}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg3);border-radius:8px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:14px;font-weight:600}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);padding:4px}
.modal-body{padding:20px}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:8px}
.empty-text{font-size:13px}

/* FORM TEXTAREA */
textarea.topbar-search{font-family:inherit;line-height:1.5;resize:vertical}

/* ACTIVITY FEED */
.activity-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.activity-text{font-size:12px;color:var(--text2);line-height:1.5}
.activity-text strong{color:var(--text);font-weight:600}
.activity-time{font-size:10px;color:var(--text3);margin-top:2px}

/* PHONE PREVIEW MINI */
.phone-mini{width:180px;background:var(--brand);border-radius:20px;padding:6px;margin:0 auto;flex-shrink:0}
.phone-mini-screen{height:320px;background:var(--bg);border-radius:15px;overflow:hidden;position:relative}
.phone-mini-header{height:80px;background:linear-gradient(180deg,var(--brand),var(--brand2));display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:12px}
.phone-mini-name{font-size:16px;font-weight:600;font-style:italic;color:var(--accent2)}
.phone-mini-amp{font-size:10px;color:var(--accent)}
.phone-mini-section{padding:8px 10px;border-bottom:1px solid var(--border)}
.phone-mini-label{font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:3px}
.phone-mini-val{font-size:10px;color:var(--text)}

/* VENDOR TABLE EXTRAS */
.revenue-big{font-size:32px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.revenue-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* HIDDEN */
.hidden{display:none!important}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{width:60px}
  .sb-brand span,.sb-role-label,.sb-roles .sb-role span:not(.sb-role-icon),.sb-nav-label,.sb-link span:not(.sb-link-icon),.sb-link-badge,.sb-user-info,.sb-badge{display:none}
  .sb-brand{padding:14px 12px;justify-content:center}
  .sb-role{justify-content:center;padding:8px}
  .sb-link{justify-content:center;padding:8px}
  .sb-footer{justify-content:center}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:1fr}
  .grid-2{grid-template-columns:1fr}
}

@media print{
  .sidebar,.topbar{display:none!important}
  .content{padding:20px!important}
  .main{overflow:visible!important}
  .content{overflow:visible!important}
  .stat-card,.card,.table-card{break-inside:avoid}
}
</style>
</head>
<body>

  <!-- SIDEBAR -->

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">

    <div class="modal-body" id="modalBody"></div>

// ===== RENDER ENGINE =====
function render() {
  renderSidebar();
  renderTopbar();
  renderContent();
}

function renderSidebar() {
  var sb = document.getElementById('sidebar');
  var navItems = getNavItems();
  var roleIcons = {couple:'\u2665',planner:'\u2606',vendor:'\u2699'};
  var roleLabels = {couple:'Pasangan',planner:'Perancang',vendor:'Admin'};

  sb.innerHTML =
    '<div class="sb-brand"><div class="sb-logo">e<span>&middot;</span>motion</div><div class="sb-badge">.MY</div></div>' +
    '<div class="sb-role-switch"><div class="sb-role-label">Dashboard</div><div class="sb-roles">' +
    ['couple','planner','vendor'].map(function(r){
      return '<button class="sb-role'+(state.role===r?' active':'')+'" onclick="switchRole(\''+r+'\')"><span class="sb-role-icon">'+roleIcons[r]+'</span><span>'+roleLabels[r]+'</span></button>';
    }).join('') +
    '</div></div>' +
    '<div class="sb-nav">' + navItems.map(function(item){
      if(item.label) return '<div class="sb-nav-label">'+item.label+'</div>';
      return '<div class="sb-link'+(state.page===item.id?' active':'')+'" onclick="goPage(\''+item.id+'\')"><span class="sb-link-icon">'+item.icon+'</span><span>'+item.text+'</span>'+(item.badge?'<span class="sb-link-badge">'+item.badge+'</span>':'')+'</div>';
    }).join('') + '</div>' +
    '<div class="sb-footer"><div class="sb-avatar">'+(state.role==='couple'?'FA':state.role==='planner'?'AS':'EM')+'</div><div class="sb-user-info"><div class="sb-user-name">'+(state.role==='couple'?'Farah & Adam':state.role==='planner'?'Aisyah Studio':'Admin')+'</div><div class="sb-user-email">'+(state.role==='couple'?'farah@email.com':state.role==='planner'?'aisyah@studio.my':'admin@e-motion.my')+'</div></div></div>';
}

function getNavItems() {
  if (state.role === 'couple') return [
    {label:'Kad Saya'},{id:'overview',icon:'\u25A3',text:'Gambaran Keseluruhan'},
    {id:'rsvp',icon:'\u2713',text:'RSVP',badge:DATA.couple.rsvps.filter(function(r){return r.status==='attending'}).length},
    {id:'wishes',icon:'\u2661',text:'Ucapan',badge:DATA.couple.wishes.length},
    {id:'gifts',icon:'\u2737',text:'Hadiah Digital'},
    {label:'Tetapan'},{id:'edit',icon:'\u270E',text:'Sunting Kad'},
    {id:'share',icon:'\u2197',text:'Kongsi'},
    {id:'analytics',icon:'\u2636',text:'Analitik'}
  ];
  if (state.role === 'planner') return [
    {label:'Portfolio'},{id:'overview',icon:'\u25A3',text:'Semua Klien'},
    {id:'calendar',icon:'\u2637',text:'Kalendar'},
    {label:'Alatan'},{id:'templates',icon:'\u2B13',text:'Templat'},
    {id:'invoices',icon:'\u2630',text:'Invois'}

  return [
    {label:'Perniagaan'},{id:'overview',icon:'\u25A3',text:'Dashboard'},

}

function renderTopbar() {

      '<div class="grid-2">' +
        '<div class="card"><div class="card-body">' +
          '<div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:12px">Umum</div>' +
          formField('Nama Platform','e-motion.my','text') +
          formField('E-mel Sokongan','support@e-motion.my','text') +
          formField('Nombor WhatsApp','+60 11-1234 5678','text') +
          '<div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-weight:600;margin:20px 0 12px">Harga</div>' +

          formField('Tempoh Motion','1 tahun','text') +

        '<div class="card"><div class="card-body">' +

          formField('API Key','em_live_sk_••••••••••••7f3a','text') +
          '<div style="font-size:11px;color:var(--text3);margin-top:4px">Jangan kongsi kunci ini. <span style="color:var(--blue);cursor:pointer">Jana semula &rarr;</span></div>' +
        '</div></div>' +
      '</div>';
  }
  else {
    c.innerHTML = '<div class="empty-state"><div class="empty-icon">\u2699</div><div class="empty-text">Bahagian ini akan datang tidak lama lagi.</div></div>';

// ===== FORM HELPERS =====
function formField(label, value, type) {
  if (type === 'textarea') {
    return '<div style="margin-bottom:12px">'+(label?'<div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px">'+label+'</div>':'')+'<textarea class="topbar-search" style="width:100%;min-height:64px;resize:vertical;padding:8px 12px;font-size:12px">'+value+'</textarea></div>';
  }
  return '<div style="margin-bottom:12px">'+(label?'<div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px">'+label+'</div>':'')+'<input class="topbar-search" style="width:100%" value="'+value+'"></div>';
}

function toggleRow(label, on) {
  var id = 'tog_' + label.replace(/\s/g,'_');
  return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;color:var(--text)">'+label+'</span><div style="width:36px;height:20px;border-radius:10px;background:'+(on?'var(--green)':'var(--border2)')+';cursor:pointer;position:relative;transition:background .2s" onclick="this.dataset.on=this.dataset.on===\'1\'?\'0\':\'1\';this.style.background=this.dataset.on===\'1\'?\'var(--green)\':\'var(--border2)\';this.firstElementChild.style.left=this.dataset.on===\'1\'?\'18px\':\'2px\'" data-on="'+(on?'1':'0')+'"><div style="width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;left:'+(on?'18':'2')+'px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)"></div></div></div>';
}

function shareBtn(icon, label, color, desc) {
  return '<div style="display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:background .15s" onmouseover="this.style.background=\'var(--bg)\'" onmouseout="this.style.background=\'\'"><div style="width:36px;height:36px;border-radius:50%;background:'+color+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0">'+icon+'</div><div><div style="font-size:12px;font-weight:600">'+label+'</div><div style="font-size:11px;color:var(--text3)">'+desc+'</div></div></div>';
}

function copyShareLink() {
  var el = document.getElementById('shareUrl');
  if (el) { el.select(); }
  openModal('Disalin!', '<div style="text-align:center"><div style="font-size:32px;margin-bottom:8px">&#128203;</div><div style="font-size:13px;color:var(--text2)">Pautan kad telah disalin ke papan keratan anda.</div></div>');
}

function drawQR() {
  var canvas = document.getElementById('qrCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var s = 160, m = 8, cs = 4;
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, s, s);
  ctx.fillStyle = '#1a2040';
  // Draw a decorative QR-like pattern
  var grid = [];
  for (var i = 0; i < 36; i++) grid.push(Math.random() > 0.45 ? 1 : 0);
  // Corner markers
  function drawMarker(x, y) {
    ctx.fillRect(x, y, 28, 28);
    ctx.fillStyle = '#fff';
    ctx.fillRect(x+4, y+4, 20, 20);
    ctx.fillStyle = '#1a2040';
    ctx.fillRect(x+8, y+8, 12, 12);
  }
  drawMarker(m, m);
  drawMarker(s-m-28, m);
  drawMarker(m, s-m-28);
  // Data modules
  for (var row = 0; row < 6; row++) {
    for (var col = 0; col < 6; col++) {
      if (grid[row*6+col]) {
        var px = 40 + col * (cs+14);
        var py = 40 + row * (cs+14);
        if (px < s-10 && py < s-10) ctx.fillRect(px, py, cs+8, cs+8);
      }
    }
  }
  // Brand accent
  ctx.fillStyle = '#c9a24e';
  ctx.fillRect(s/2-6, s/2-6, 12, 12);
}

// ===== HELPERS =====
function statCard(label,value,sub,dir,color) {
  return '<div class="stat-card"><div class="stat-label">'+label+'</div><div class="stat-value"'+(color?'style="color:var(--'+color+')"':'')+'>'+value+'</div>'+(sub?'<div class="stat-change'+(dir?' '+dir:'')+'">'+sub+'</div>':'')+'</div>';
}

function tableCard(title,headers,rows,filters) {
  return '<div class="table-card"><div class="table-header"><div class="table-title">'+title+'</div><div class="table-actions">'+(filters?filters.map(function(f,i){return '<button class="filter-btn'+(i===0?' active':'')+'" onclick="this.parentElement.querySelectorAll(\'.filter-btn\').forEach(function(b){b.classList.remove(\'active\')});this.classList.add(\'active\')">'+f+'</button>'}).join(''):'')+'</div></div><table><thead><tr>'+headers.map(function(h){return '<th>'+h+'</th>'}).join('')+'</tr></thead><tbody>'+rows.map(function(r){return '<tr>'+r.map(function(cell){return '<td>'+cell+'</td>'}).join('')+'</tr>'}).join('')+'</tbody></table></div>';
}

function activityFeed(items) {
  return items.map(function(a){return '<div class="activity-item"><div class="activity-dot" style="background:'+a.color+'"></div><div><div class="activity-text">'+a.text+'</div><div class="activity-time">'+a.time+'</div></div></div>'}).join('');
}

// ===== CHARTS =====
function makeLineChart(id,labels,data,label) {
  var ctx = document.getElementById(id);
  if(!ctx) return;
  new Chart(ctx,{type:'line',data:{labels:labels,datasets:[{label:label,data:data,borderColor:'#c9a24e',backgroundColor:'rgba(201,162,78,.1)',fill:true,tension:.4,pointRadius:3,pointBackgroundColor:'#c9a24e',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#a8a29e'}},y:{grid:{color:'#f5f5f4'},ticks:{font:{size:10},color:'#a8a29e'}}}}});
}
function makeBarChart(id,labels,data,label) {
  var ctx = document.getElementById(id);
  if(!ctx) return;
  new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{label:label,data:data,backgroundColor:'rgba(26,32,64,.8)',borderRadius:4,barThickness:28}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#a8a29e'}},y:{grid:{color:'#f5f5f4'},ticks:{font:{size:10},color:'#a8a29e'}}}}});
}
function makeDoughnut(id,labels,data) {
  var ctx = document.getElementById(id);
  if(!ctx) return;
  new Chart(ctx,{type:'doughnut',data:{labels:labels,datasets:[{data:data,backgroundColor:['#1a2040','#c9a24e','#6b1d2e','#d6d3d1'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:12,usePointStyle:true,pointStyleWidth:8}}}}});
}

// ===== NAVIGATION =====
function switchRole(role) {
  state.role = role;
  state.page = 'overview';
  render();
}
function goPage(page) {
  state.page = page;
  renderTopbar();
  renderContent();
  // Update sidebar active
  document.querySelectorAll('.sb-link').forEach(function(el){el.classList.remove('active')});
  var links = document.querySelectorAll('.sb-link');
  links.forEach(function(el){
    if(el.getAttribute('onclick') && el.getAttribute('onclick').indexOf("'"+page+"'")>-1) el.classList.add('active');
  });
}

function openModal(title,bodyHTML) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHTML;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// ===== INIT =====
render();
</script>
