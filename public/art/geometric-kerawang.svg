<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="modBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F3EC"/>
      <stop offset="100%" stop-color="#EFE5D6"/>
    </linearGradient>
    <pattern id="kerawang" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="none"/>
      <circle cx="60" cy="60" r="38" fill="none" stroke="#8FA08C" stroke-width="0.7" opacity="0.55"/>
      <circle cx="60" cy="60" r="22" fill="none" stroke="#C58B7A" stroke-width="0.6" opacity="0.4"/>
      <path d="M60 22 L98 60 L60 98 L22 60 Z" fill="none" stroke="#8FA08C" stroke-width="0.6" opacity="0.45"/>
      <path d="M0 60 L120 60 M60 0 L60 120" stroke="#8FA08C" stroke-width="0.4" opacity="0.25"/>
    </pattern>
    <radialGradient id="modVignette" cx="50%" cy="50%" r="60%">
      <stop offset="55%" stop-color="rgba(248,243,236,0)"/>
      <stop offset="100%" stop-color="rgba(44,50,54,0.18)"/>
    </radialGradient>
  </defs>

  <rect width="720" height="1280" fill="url(#modBg)"/>

  <!-- Top kerawang band -->
  <rect x="0" y="0" width="720" height="180" fill="url(#kerawang)" opacity="0.7"/>
  <!-- Bottom kerawang band -->
  <rect x="0" y="1100" width="720" height="180" fill="url(#kerawang)" opacity="0.7"/>

  <!-- Side kerawang strips -->
  <rect x="0" y="180" width="60" height="920" fill="url(#kerawang)" opacity="0.55"/>
  <rect x="660" y="180" width="60" height="920" fill="url(#kerawang)" opacity="0.55"/>

  <!-- Geometric outer frame -->
  <rect x="36" y="36" width="648" height="1208" fill="none" stroke="#2C3236" stroke-width="2"/>
  <rect x="50" y="50" width="620" height="1180" fill="none" stroke="#C58B7A" stroke-width="0.8" opacity="0.7"/>

  <!-- Top minimal divider -->
  <g stroke="#8FA08C" stroke-width="1.4" fill="none">
    <line x1="200" y1="120" x2="520" y2="120"/>
    <circle cx="360" cy="120" r="5" fill="#C58B7A" stroke="none"/>
    <line x1="200" y1="1160" x2="520" y2="1160"/>
    <circle cx="360" cy="1160" r="5" fill="#C58B7A" stroke="none"/>
  </g>

  <!-- Subtle center vignette -->
  <rect width="720" height="1280" fill="url(#modVignette)"/>

  <!-- Bauhaus accent shapes -->
  <g opacity="0.18">
    <circle cx="100" cy="220" r="42" fill="#C58B7A"/>
    <rect x="580" y="980" width="80" height="80" fill="#8FA08C"/>
    <path d="M620 220 L680 220 L650 280 Z" fill="#2C3236"/>
    <path d="M40 980 L100 980 L70 1040 Z" fill="#2C3236"/>
  </g>
</svg>
